kind: Deployment
apiVersion: apps/v1
metadata:
  name: foo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: http-echo
      instance: foo
  template:
    metadata:
      labels:
        app: http-echo
        instance: foo
    spec:
      containers:
      - name: foo-app
        image: registry.k8s.io/e2e-test-images/agnhost:2.39
        command:
        - /agnhost
        - serve-hostname
        - --http=true
        - --port=8080
---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: bar-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: http-echo
      instance: bar
  template:
    metadata:
      labels:
        app: http-echo
        instance: bar
    spec:
      containers:
      - name: bar-app
        command:
        - /agnhost
        - serve-hostname
        - --http=true
        - --port=8080
        image: registry.k8s.io/e2e-test-images/agnhost:2.39
---
kind: Service
apiVersion: v1
metadata:
  name: foo-service
spec:
  type: LoadBalancer
  selector:
    app: http-echo
  ports:
  - port: 5678
    targetPort: 8080
    nodePort: 32650
